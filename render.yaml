# Render Blueprint for XT-Forge.
#
# Creates: 1 web service (gunicorn), 1 worker (django-q2 qcluster),
# 1 Redis instance, 1 managed Postgres. Web + worker share the SAME
# Docker image; only the start command differs.
#
# First-time setup:
#   1. Push this repo to https://github.com/xebia-arvind/xt-forge-agent
#   2. Render → New + → Blueprint → point at the repo.
#   3. In the dashboard, fill the two sync:false secrets on BOTH web + worker:
#         OPENAI_API_KEY   — fresh key from platform.openai.com
#         FERNET_KEY       — `python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"`
#   4. Wait ~10 min for the first build. Then open a Render Shell on the
#      web service and run:
#         cd /app/ai-healer-django/flaky_healer && python manage.py createsuperuser

services:
  # ------ Redis (25 MB free tier — django-q2 broker) ------
  - type: redis
    name: xt-forge-redis
    plan: free
    ipAllowList: []             # only reachable from services in this account
    maxmemoryPolicy: allkeys-lru

  # ------ Web (Django + gunicorn) ------
  - type: web
    name: xt-forge-web
    runtime: docker
    plan: free
    dockerfilePath: ./ai-healer-django/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: PUBLIC_BASE_URL
        # Replace with your actual Render URL after the first deploy.
        value: "https://xt-forge-web.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: xt-forge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: xt-forge-redis
          property: connectionString

      # --- LLM + pipeline knobs ---
      - key: OPENAI_API_KEY
        sync: false             # set manually in dashboard — never committed
      - key: FERNET_KEY
        sync: false             # set manually in dashboard — Jira token AES key
      - key: OPENAI_TOOL_USE
        value: "on"
      - key: OPENAI_MODEL_FEATURE
        value: "gpt-4o-mini"
      - key: OPENAI_MODEL_MANUAL_TESTS
        value: "gpt-4o-mini"
      - key: OPENAI_MODEL_PLAN
        value: "gpt-4o"
      - key: OPENAI_MODEL_ARTIFACTS
        value: "gpt-4o"
      - key: OPENAI_MODEL_FIXER
        value: "gpt-4o"

      # --- Pipeline flags ---
      - key: XT_FORGE_REQUIRE_UI_KNOWLEDGE
        value: "true"
      - key: SELECTOR_VERIFY_ENABLED
        value: "on"
      - key: USE_HEALING_CACHE
        value: "true"
      - key: HEALING_CACHE_MIN_CONFIDENCE
        value: "0.30"
      - key: TEST_GEN_USE_UI_KNOWLEDGE
        value: "false"
      - key: TEST_GEN_ENABLE_CODEGEN
        value: "true"

  # ------ Worker (django-q2 qcluster) ------
  # Background Worker services are not on Render's free tier — Starter is
  # the entry-level plan at $7/mo. Required so async_task enqueues from web
  # requests get picked up out-of-process.
  - type: worker
    name: xt-forge-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./ai-healer-django/Dockerfile
    dockerContext: .
    autoDeploy: true
    # Render passes dockerCommand as a single string to Docker's shell exec
    # (`/bin/sh -c "<value>"`). Nesting a second `sh -c "..."` inside caused
    # the whole `cd … && python …` to be treated as a filename. Instead,
    # rely on the image's WORKDIR (set at Dockerfile line 49) being
    # /app/ai-healer-django/flaky_healer — no `cd` needed.
    dockerCommand: python manage.py qcluster
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: xt-forge-web
          envVarKey: DJANGO_SECRET_KEY
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*"              # worker doesn't serve HTTP; wildcard is fine
      - key: DATABASE_URL
        fromDatabase:
          name: xt-forge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: xt-forge-redis
          property: connectionString

      - key: OPENAI_API_KEY
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: OPENAI_TOOL_USE
        value: "on"
      - key: OPENAI_MODEL_FEATURE
        value: "gpt-4o-mini"
      - key: OPENAI_MODEL_MANUAL_TESTS
        value: "gpt-4o-mini"
      - key: OPENAI_MODEL_PLAN
        value: "gpt-4o"
      - key: OPENAI_MODEL_ARTIFACTS
        value: "gpt-4o"
      - key: OPENAI_MODEL_FIXER
        value: "gpt-4o"
      - key: XT_FORGE_REQUIRE_UI_KNOWLEDGE
        value: "true"
      - key: SELECTOR_VERIFY_ENABLED
        value: "on"
      - key: USE_HEALING_CACHE
        value: "true"

# ------ Postgres (free 90-day, then $7/mo) ------
databases:
  - name: xt-forge-db
    plan: free
    databaseName: xt_forge
    user: xt_forge
